<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #610ee75b; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: bisque; width: 420px; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        h1 { margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid gray; }
        button { width: 95%; padding: 10px; background: green; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: darkgreen; }
        .error { color: red; margin-bottom: 10px; }
        p { margin-top: 20px; }
        a { text-decoration: none; color: blue; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>💵 Expense Tracker</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form action="/" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="/register">Register</a></p>
    </div>
</body>
</html>
