<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Expense Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #610ee75b; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { width: 420px; background: bisque; padding: 30px; border-radius: 12px; text-align: center; }
        h1 { margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid gray; }
        button { width: 95%; padding: 10px; background: green; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .error { color: red; margin-bottom: 10px; }
        a { text-decoration: none; color: blue; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Create Account</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <br>
        <a href="/">Already have an account? Login</a>
    </div>
</body>
</html>
